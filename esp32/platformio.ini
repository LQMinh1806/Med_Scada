; ═══════════════════════════════════════════════════════════════════════════════
; PlatformIO Configuration — ESP32 Fingerprint Module
; ═══════════════════════════════════════════════════════════════════════════════
;
; Build & Upload:
;   pio run -t upload
;   pio device monitor
;
; Or open this project in VS Code with PlatformIO extension.
; ═══════════════════════════════════════════════════════════════════════════════

[env:esp32-s3-super-mini]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.mcu = esp32s3
build_flags =
    -D CORE_DEBUG_LEVEL=1
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; Library dependencies
lib_deps =
    adafruit/Adafruit Fingerprint Sensor Library@^2.1.0
    bblanchon/ArduinoJson@^7.0.0



; Upload settings (adjust COM port if needed)
; upload_port = COM3
; monitor_port = COM3
